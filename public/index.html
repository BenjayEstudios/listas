<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestor de Listas | Benjamin</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="card">
        <!-- VISTA 1: LISTAS GENERALES -->
        <div id="vistaListas">
            <h1>🚀 Mis Listas</h1>
            <div class="input-group">
                <input type="text" id="nombreLista" placeholder="¿Qué nombre tendrá tu lista?">
                <button class="btn-add" onclick="crearNuevaLista()">Crear Lista</button>
            </div>
            <div id="contenedorListas">
                <p>Cargando datos del servidor...</p>
            </div>
        </div>

        <!-- VISTA 2: ÍTEMS DE UNA LISTA (Oculta por defecto) -->
        <div id="vistaItems" style="display: none;">
            <button onclick="regresarAListas()" class="btn-edit" style="margin-bottom: 20px; border-color: var(--text-muted); color: var(--text-muted);">
                ← Volver
            </button>
            
            <h1 id="tituloListaActual" style="text-align: left; margin-bottom: 10px;">Nombre Lista</h1>
            <p style="color: var(--text-muted); margin-bottom: 20px;">Añade tareas a esta lista:</p>

            <div class="input-group">
                <input type="text" id="nuevoItemInput" placeholder="Ej: Comprar pan...">
                <button class="btn-add" onclick="crearItem()">Añadir</button>
            </div>

            <div id="contenedorItems">
                <!-- Aquí se cargarán los ítems vía JS -->
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
