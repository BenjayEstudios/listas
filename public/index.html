<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lista Pro | Benjamin</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <span class="brand">Lista<span>Pro</span></span>
            <button id="theme-toggle" onclick="toggleTheme()" class="btn-icon">🌓</button>
        </header>
 
        <main class="card">
            <div id="vistaListas" style="display: flex;">
                <div class="header-section">
                    <h1>Mis Listas</h1>
                    <div class="input-compact">
                        <input type="text" id="nombreLista" placeholder="¿Qué nombre tendrá tu lista?">
                        <button class="btn-primary" onclick="crearNuevaLista()">+</button>
                    </div>
                </div>
                <div id="contenedorListas" class="scroll-area">
                    <p class="loader" style="color: var(--text-muted); text-align:center;">Cargando datos...</p>
                </div>
            </div>

            <div id="vistaItems" style="display: none;">
                <div class="header-section">
                    <button onclick="regresarAListas()" class="btn-back">
                        <span style="font-size: 1.2rem; margin-right: 4px;">←</span> Volver
                    </button>
                    <h2 id="tituloListaActual">Nombre Lista</h2>
                    <div class="input-compact">
                        <input type="text" id="nuevoItemInput" placeholder="Ej: Comprar pan...">
                        <button class="btn-primary" onclick="crearItem()">+</button>
                    </div>
                </div>
                <div id="contenedorItems" class="scroll-area">
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
